name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Lint (ruff check)
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Format check (ruff format --check)
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run --python ${{ matrix.python-version }} mypy --strict src/robust_llm_chain

      - name: Unit tests
        run: |
          uv run --python ${{ matrix.python-version }} pytest tests/ \
            -m "not integration and not e2e" \
            --cov=src/robust_llm_chain \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage (3.13 only)
        if: always() && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
